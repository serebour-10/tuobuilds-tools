/* ─── Utilities ──────────────────────────────────── */
let _n=Date.now();
const uid=()=>String(++_n);
const sf=v=>{const n=parseFloat(v);return isNaN(n)?0:n;};
const fmtN=n=>Number(n).toLocaleString("en-GH",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtX=n=>Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:4});
const today=()=>new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const isoDate=()=>new Date().toISOString().slice(0,10);
const pad=(s,w)=>String(s).padEnd(w);
const padL=(s,w)=>String(s).padStart(w);

/* FX helpers — all internal values stored in GHS */
function toGHS(amt,fromCurr,rates){return fromCurr==="GHS"?sf(amt):sf(amt)/(rates[fromCurr]||1);}
function fromGHS(ghsAmt,toCurr,rates){return toCurr==="GHS"?ghsAmt:ghsAmt*(rates[toCurr]||1);}
function crossConvert(amt,from,to,rates){return fromGHS(toGHS(amt,from,rates),to,rates);}

function MobileModal({content,onClose,title}){
  const [copied,setCopied]=useState(false);
  const doCopy=()=>{navigator.clipboard.writeText(content).then(()=>setCopied(true)).catch(()=>{try{const el=document.getElementById("_mta");el.select();document.execCommand("copy");setCopied(true);}catch(e){}});};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(10,22,40,0.97)",zIndex:9999,display:"flex",flexDirection:"column",padding:20,gap:12}}>
      <div style={{fontFamily:"Courier New",fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:GOLD}}>⎙ {title}</div>
      <div style={{fontSize:13,color:MUTED}}>Tap <strong style={{color:WHITE}}>Copy</strong> then paste into Notes, WhatsApp, or Email.</div>
      <textarea id="_mta" readOnly value={content} style={{flex:1,background:NAVY_M,color:WHITE,border:`1px solid ${BORDER}`,borderRadius:3,fontFamily:"Courier New",fontSize:11,padding:12,resize:"none",outline:"none",lineHeight:1.6}}/>
      <div style={{display:"flex",gap:10}}><button onClick={doCopy} style={{...BTN_P,flex:1}}>⧉ Copy</button><button onClick={onClose} style={BTN_S}>Close</button></div>
      {copied&&<div style={{fontFamily:"Courier New",fontSize:11,color:OK,textAlign:"center"}}>✓ Copied!</div>}
    </div>
  );
}

function downloadOrModal(content,filename,setModal){
  try{const blob=new Blob([content],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}
  catch(e){setModal(content);}
}
function printHTML(html){const w=window.open("","_blank");if(!w)return;w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),500);}

function BarChart({data,sym,cv}){
  if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>d.val),1);
  return(
    <div style={{marginTop:16}}>
      {data.map(({label,val,color})=>(
        <div key={label} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontFamily:"Courier New",fontSize:11,marginBottom:4}}>
            <span style={{color:MUTED}}>{label}</span>
            <span style={{color:WHITE}}>{sym} {fmtX(cv(val))}</span>
          </div>
          <div style={{background:NAVY,borderRadius:2,height:10,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(val/max)*100}%`,background:color,borderRadius:2,transition:"width 0.6s ease"}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   CURRENCY PANEL
══════════════════════════════════════════════════════ */
function CurrencyPanel({display,setDisplay,rates,setRates,rateStatus,refreshRates}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState({});

  const startEdit=()=>{
    const d={};
    CURRS.filter(c=>c!=="GHS").forEach(c=>d[c]=String((1/rates[c]).toFixed(4)));
    setDraft(d);setEditing(true);
  };
  const applyEdit=()=>{
    const nr={GHS:1};
    CURRS.filter(c=>c!=="GHS").forEach(c=>{const v=sf(draft[c]);if(v>0)nr[c]=1/v;else nr[c]=rates[c];});
    setRates(nr);setEditing(false);
  };

  return(
    <Sec title="Exchange Rates & Currency">
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
        {CURRS.map(c=>{
          const ghsVal=c==="GHS"?1:(1/rates[c]);
          return(
            <div key={c} onClick={()=>setDisplay(c)} style={{background:display===c?"rgba(201,168,76,0.1)":NAVY,border:`1px solid ${display===c?GOLD:BORDER}`,borderRadius:3,padding:"10px 12px",cursor:"pointer",transition:"all 0.2s"}}>
              <div style={{fontFamily:"Courier New",fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:display===c?GOLD:MUTED,marginBottom:4}}>{CURR_FLAGS[c]} {c}</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:display===c?GOLD_L:WHITE}}>
                {c==="GHS"?"1.0000":fmtX(ghsVal)}
              </div>
              <div style={{fontFamily:"Courier New",fontSize:9,color:MUTED,marginTop:2}}>GHS per 1 {c}</div>
            </div>
          );
        })}
      </div>
      {editing?(
        <div style={{background:NAVY,border:`1px solid ${BORDER}`,borderRadius:3,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontFamily:"Courier New",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",color:GOLD,marginBottom:10}}>Override Rates — GHS per 1 unit of foreign currency</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
            {CURRS.filter(c=>c!=="GHS").map(c=>(
              <Field key={c} label={`1 ${c} = ? GHS`}>
                <input style={INP} type="number" value={draft[c]} step="0.01" min="0.01" onChange={e=>setDraft(d=>({...d,[c]:e.target.value}))}/>
              </Field>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...BTN_P,padding:"9px 16px"}} onClick={applyEdit}>✓ Apply</button>
            <button style={BTN_S} onClick={()=>setEditing(false)}>Cancel</button>
          </div>
        </div>
      ):(
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <button style={{...BTN_S,borderColor:GOLD,color:GOLD}} onClick={refreshRates}>⟳ Fetch Live Rates</button>
          <button style={BTN_S} onClick={startEdit}>✎ Override Manually</button>
          <div style={{fontFamily:"Courier New",fontSize:10,color:MUTED}}>{rateStatus}</div>
        </div>
      )}
      {/* Cross rate table */}
      <div style={{marginTop:14,overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:320}}>
          <thead><tr>
            <th style={{fontFamily:"Courier New",fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:GOLD_D,padding:"0 8px 6px",textAlign:"left",borderBottom:`1px solid ${BORDER}`}}>1 →</th>
            {CURRS.map(c=><th key={c} style={{fontFamily:"Courier New",fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:GOLD_D,padding:"0 8px 6px",textAlign:"right",borderBottom:`1px solid ${BORDER}`}}>{c}</th>)}
          </tr></thead>
          <tbody>
            {CURRS.map(from=>(
              <tr key={from} style={{borderBottom:`1px solid rgba(201,168,76,0.05)`}}>
                <td style={{fontFamily:"Courier New",fontSize:11,color:GOLD,padding:"6px 8px"}}>{from}</td>
                {CURRS.map(to=>{
                  const val=crossConvert(1,from,to,rates);
                  return(
                    <td key={to} style={{fontFamily:"Courier New",fontSize:11,color:from===to?GOLD_D:WHITE,padding:"6px 8px",textAlign:"right",background:from===to?"rgba(201,168,76,0.04)":"transparent"}}>
                      {from===to?"—":fmtX(val)}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{fontFamily:"Courier New",fontSize:9,color:MUTED,marginTop:6,textAlign:"right"}}>Via GHS base. Click ⟳ to update. Rates indicative only.</div>
      </div>
    </Sec>
  );
}

function CostEstimator({display,rates,projName,client,loc,ptype,onSave,savedData}){
  const [oh,setOh]=useState("10");
  const [con,setCon]=useState("5");
  const [vat,setVat]=useState("0");
  const [mats,setMats]=useState([]);
  const [labs,setLabs]=useState([]);
  const [modal,setModal]=useState(null);
  const [dbOpen,setDbOpen]=useState(false);
  const [dbCat,setDbCat]=useState("All");
  const [dbSearch,setDbSearch]=useState("");
  const [labOpen,setLabOpen]=useState(false);
  const [labCat,setLabCat]=useState("All");
  const [saveMsg,setSaveMsg]=useState("");

  useEffect(()=>{
    if(savedData&&(savedData.mats||savedData.labs)){
      setMats(savedData.mats||[]);setLabs(savedData.labs||[]);
      setOh(savedData.oh||"10");setCon(savedData.con||"5");setVat(savedData.vat||"0");
    } else {
      setMats([
        {id:uid(),item:"GHACEM Cement 42.5R (50kg bag)",qty:100,unit:"bags",rate:88,cur:"GHS"},
        {id:uid(),item:"Sharp sand (filling grade, ton)",qty:20,unit:"tons",rate:300,cur:"GHS"},
        {id:uid(),item:"Granite chippings 3/4\" (ton)",qty:15,unit:"tons",rate:380,cur:"GHS"},
        {id:uid(),item:"Y12 high tensile (12m)",qty:50,unit:"pcs",rate:85,cur:"GHS"},
        {id:uid(),item:"Sandcrete block 6\" solid",qty:2000,unit:"pcs",rate:14,cur:"GHS"},
      ]);
      setLabs([
        {id:uid(),role:"Mason / Bricklayer",days:45,workers:4,rate:180,cur:"GHS"},
        {id:uid(),role:"General Labourer",days:60,workers:6,rate:100,cur:"GHS"},
      ]);
    }
  },[]);

  const cv=n=>fromGHS(n,display,rates);
  const sym=display;
  const fm=n=>`${sym} ${fmtX(cv(n))}`;

  const matGHS=mats.reduce((s,r)=>s+toGHS(sf(r.qty)*sf(r.rate),r.cur||"GHS",rates),0);
  const labGHS=labs.reduce((s,r)=>s+toGHS(sf(r.days)*sf(r.workers)*sf(r.rate),r.cur||"GHS",rates),0);
  const dirGHS=matGHS+labGHS;
  const ohAmt=dirGHS*sf(oh)/100,conAmt=(dirGHS+ohAmt)*sf(con)/100;
  const sub=dirGHS+ohAmt+conAmt,vatAmt=sub*sf(vat)/100,totalGHS=sub+vatAmt;

  const cats=["All",...new Set(GH_PRICES.map(p=>p.cat))];
  const labCats=["All",...new Set(LABOUR_TEMPLATES.map(t=>t.cat))];
  const fDb=GH_PRICES.filter(p=>(dbCat==="All"||p.cat===dbCat)&&(p.item.toLowerCase().includes(dbSearch.toLowerCase())||p.cat.toLowerCase().includes(dbSearch.toLowerCase())||p.note.toLowerCase().includes(dbSearch.toLowerCase())));
  const fLab=LABOUR_TEMPLATES.filter(t=>labCat==="All"||t.cat===labCat);

  const handleSave=()=>{onSave({mats,labs,oh,con,vat});setSaveMsg("✓ Saved!");setTimeout(()=>setSaveMsg(""),2000);};

  const chartData=[{label:"Materials",val:matGHS,color:BLUE},{label:"Labour",val:labGHS,color:OK},{label:"Overhead",val:ohAmt,color:ORANGE},{label:"Contingency",val:conAmt,color:GOLD},...(vatAmt>0?[{label:"VAT/Tax",val:vatAmt,color:PURPLE}]:[])];

  const buildPrintHTML=()=>{
    const maxB=Math.max(...chartData.map(d=>d.val),1);
    const barsHTML=chartData.map(d=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#555">${d.label}</span><span>${fm(d.val)}${display!=="GHS"?` (GHS ${fmtN(d.val)})`:""}</span></div><div style="background:#e5e7eb;height:12px;border-radius:3px;overflow:hidden"><div style="height:100%;width:${(d.val/maxB)*100}%;background:${d.color};border-radius:3px"></div></div></div>`).join("");
    const fxNote=display!=="GHS"?`<p style="font-size:11px;color:#6b7280">Rates: 1 USD=GHS ${fmtX(1/rates.USD)}, 1 GBP=GHS ${fmtX(1/rates.GBP)}, 1 EUR=GHS ${fmtX(1/rates.EUR)} (${today()})</p>`:"";
    return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cost Estimate</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#111;margin:0}.hdr{border-bottom:3px solid #c9a84c;padding-bottom:16px;margin-bottom:24px}.co{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#c9a84c;font-weight:700}h1{font-size:22px;color:#0a1628;margin:6px 0}.meta{font-size:12px;color:#6b7280;margin-top:6px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#0a1628;color:#c9a84c;padding:9px 10px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-align:left}td{padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:13px}tr:nth-child(even)td{background:#f9fafb}.stotal td{font-weight:700;background:#f3f4f6}.grand{background:#0a1628!important;color:#e8c97a;font-weight:700;font-size:14px}.sec-hdr{font-weight:700;font-size:12px;text-transform:uppercase;color:#374151;padding:10px;background:#f3f4f6;border-top:2px solid #c9a84c}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px}.box{border:1px solid #e5e7eb;padding:16px;border-radius:4px}.box-title{font-size:11px;text-transform:uppercase;color:#c9a84c;font-weight:700;margin-bottom:10px}.footer{margin-top:32px;font-size:11px;color:#9ca3af;text-align:center;border-top:1px solid #e5e7eb;padding-top:14px}@media print{body{padding:15px}}</style></head><body>
    <div class="hdr"><div class="co">TuoBuilds Consult</div><h1>Cost Estimate Report</h1><div class="meta"><strong>${projName||"Unnamed Project"}</strong>${client?" · "+client:""}${loc?" · "+loc:""} · ${ptype} · ${today()}</div>${fxNote}</div>
    <table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th style="text-align:right">Rate</th><th style="text-align:right">Total (${sym})</th></tr></thead><tbody>
    <tr><td colspan="5" class="sec-hdr">Materials</td></tr>
    ${mats.map(r=>{const tGHS=toGHS(sf(r.qty)*sf(r.rate),r.cur||"GHS",rates);return`<tr><td>${r.item}</td><td>${r.qty}</td><td>${r.unit}</td><td style="text-align:right;font-family:monospace">${r.cur||"GHS"} ${fmtX(sf(r.rate))}</td><td style="text-align:right;font-family:monospace">${fm(tGHS)}</td></tr>`;}).join("")}
    <tr class="stotal"><td colspan="4" style="text-align:right">Materials Subtotal</td><td style="text-align:right;font-family:monospace">${fm(matGHS)}</td></tr>
    <tr><td colspan="5" class="sec-hdr">Labour</td></tr>
    ${labs.map(r=>{const tGHS=toGHS(sf(r.days)*sf(r.workers)*sf(r.rate),r.cur||"GHS",rates);return`<tr><td>${r.role}</td><td>${r.days}d × ${r.workers}w</td><td>—</td><td style="text-align:right;font-family:monospace">${r.cur||"GHS"} ${fmtX(sf(r.rate))}/day</td><td style="text-align:right;font-family:monospace">${fm(tGHS)}</td></tr>`;}).join("")}
    <tr class="stotal"><td colspan="4" style="text-align:right">Labour Subtotal</td><td style="text-align:right;font-family:monospace">${fm(labGHS)}</td></tr>
    <tr><td colspan="4">Overhead (${sf(oh).toFixed(1)}%)</td><td style="text-align:right;font-family:monospace">${fm(ohAmt)}</td></tr>
    <tr><td colspan="4">Contingency (${sf(con).toFixed(1)}%)</td><td style="text-align:right;font-family:monospace">${fm(conAmt)}</td></tr>
    ${vatAmt>0?`<tr><td colspan="4">VAT/Tax (${sf(vat).toFixed(1)}%)</td><td style="text-align:right;font-family:monospace">${fm(vatAmt)}</td></tr>`:""}
    <tr><td colspan="4" class="grand" style="text-align:right">TOTAL ESTIMATED COST</td><td class="grand" style="text-align:right;font-family:monospace">${fm(totalGHS)}</td></tr>
    </tbody></table>
    <div class="two-col"><div class="box"><div class="box-title">Cost Breakdown</div>${barsHTML}</div>
    <div class="box"><div class="box-title">Summary</div>${[["Materials",matGHS,BLUE],["Labour",labGHS,OK],["Overhead",ohAmt,ORANGE],["Contingency",conAmt,GOLD],...(vatAmt>0?[["VAT/Tax",vatAmt,PURPLE]]:[]),["TOTAL",totalGHS,GOLD]].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0"><span style="font-size:12px;color:#555">${l}</span><span style="font-family:monospace;font-size:12px;font-weight:${l==="TOTAL"?700:400};color:${l==="TOTAL"?"#c9a84c":"#111"}">${fm(v)}</span></div>`).join("")}</div></div>

  };

  const TH={fontFamily:"Courier New,monospace",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",color:GOLD_D,padding:"0 6px 8px",textAlign:"left",borderBottom:`1px solid ${BORDER}`};

                  <td style={TD}><input style={INP} type="number" value={row.rate} min={0} onChange={e=>setLabs(rs=>rs.map(r=>r.id===row.id?{...r,rate:e.target.value}:r))}/></td>

      <Sec title={`Live Summary — ${sym}`}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
          <SumBox label="Materials" val={`${sym} ${fmtX(cv(matGHS))}`} sub={display!=="GHS"?`GHS ${fmtN(matGHS)}`:null}/>
          <SumBox label="Labour"    val={`${sym} ${fmtX(cv(labGHS))}`} sub={display!=="GHS"?`GHS ${fmtN(labGHS)}`:null}/>
          <SumBox label="Direct"    val={`${sym} ${fmtX(cv(dirGHS))}`} sub={display!=="GHS"?`GHS ${fmtN(dirGHS)}`:null}/>
          <SumBox label={`Total (${sym})`} val={`${sym} ${fmtX(cv(totalGHS))}`} sub={display!=="GHS"?`GHS ${fmtN(totalGHS)}`:null} accent/>
        </div>
        <BarChart data={chartData} sym={sym} cv={cv}/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:16}}>
          <button style={BTN_P} onClick={()=>printHTML(buildPrintHTML())}>🖨 Print / PDF Report</button>

        </div>
      </Sec>
      {modal&&<MobileModal content={modal} onClose={()=>setModal(null)} title="Cost Estimate"/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   BOQ GENERATOR
══════════════════════════════════════════════════════ */
function BOQGenerator({display,rates,projName,client,loc,ptype,onSave,savedData}){
  const [items,setItems]=useState([]);
  const [modal,setModal]=useState(null);
  const [saveMsg,setSaveMsg]=useState("");
  const sym=display;
  const cv=n=>fromGHS(n,display,rates);

  useEffect(()=>{if(savedData&&savedData.items)setItems(savedData.items);},[]);

  const grandGHS=items.reduce((s,r)=>s+toGHS(sf(r.qty)*sf(r.rate),r.cur||"GHS",rates),0);
  const grouped=BOQ_SECTIONS.reduce((acc,sec)=>{const rows=items.filter(i=>i.section===sec);if(rows.length)acc[sec]=rows;return acc;},{});

  const handleSave=()=>{onSave({items});setSaveMsg("✓ Saved!");setTimeout(()=>setSaveMsg(""),2000);};

  const buildHTML=()=>{
    let n=1;
    const fxNote=display!=="GHS"?`<p style="font-size:11px;color:#6b7280;margin-top:4px">Display: ${sym} · Rate: 1 USD=GHS ${fmtX(1/rates.USD)}, 1 GBP=GHS ${fmtX(1/rates.GBP)}, 1 EUR=GHS ${fmtX(1/rates.EUR)} · ${today()}</p>`:"";
    const sectHTML=Object.entries(grouped).map(([sec,rows])=>{
      let stGHS=0;
      const rHTML=rows.map(r=>{const tGHS=toGHS(sf(r.qty)*sf(r.rate),r.cur||"GHS",rates);stGHS+=tGHS;return`<tr><td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:13px;color:#374151">${n++}</td><td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:13px;color:#111">${r.description||"—"}${r.notes?`<div style="font-size:11px;color:#6b7280;margin-top:2px">Note: ${r.notes}</div>`:""}</td><td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:center;font-size:13px">${r.qty}</td><td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:center;font-size:13px">${r.unit}</td><td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-family:monospace;font-size:13px">${sym} ${fmtX(cv(toGHS(sf(r.rate),r.cur||"GHS",rates)))}</td><td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-family:monospace;font-size:13px;font-weight:600">${sym} ${fmtX(cv(tGHS))}</td></tr>`;}).join("");
      return`<tr><td colspan="6" style="padding:10px;background:#f3f4f6;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#374151;border-top:2px solid #c9a84c">${sec}</td></tr>${rHTML}<tr><td colspan="5" style="padding:8px 10px;text-align:right;font-size:12px;color:#6b7280;font-style:italic">Section Total:</td><td style="padding:8px 10px;text-align:right;font-family:monospace;font-weight:700;color:#c9a84c">${sym} ${fmtX(cv(stGHS))}</td></tr>`;
    }).join("");
    return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BOQ</title><style>body{font-family:Arial,sans-serif;padding:30px;color:#111;margin:0}.hdr{border-bottom:3px solid #c9a84c;padding-bottom:16px;margin-bottom:24px}.co{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#c9a84c;font-weight:700}h1{font-size:22px;color:#0a1628;margin:6px 0}.meta{font-size:12px;color:#6b7280;margin-top:6px}table{width:100%;border-collapse:collapse}th{background:#0a1628;color:#c9a84c;padding:10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;text-align:left}.grand{background:#0a1628;color:#e8c97a;padding:12px 10px;font-weight:700;font-size:15px}.footer{margin-top:30px;font-size:11px;color:#9ca3af;text-align:center}@media print{body{padding:15px}}</style></head><body><div class="hdr"><div class="co">TuoBuilds Consult</div><h1>Bill of Quantities</h1><div class="meta"><strong>${projName||"Unnamed Project"}</strong>${client?" · "+client:""}${loc?" · "+loc:""} · ${ptype} · ${today()}</div>${fxNote}</div><table><thead><tr><th style="width:40px">No.</th><th>Description</th><th style="width:60px;text-align:center">Qty</th><th style="width:60px;text-align:center">Unit</th><th style="width:105px;text-align:right">Rate (${sym})</th><th style="width:115px;text-align:right">Amount (${sym})</th></tr></thead><tbody>${sectHTML}<tr><td colspan="5" class="grand" style="text-align:right">GRAND TOTAL</td><td class="grand" style="text-align:right;font-family:monospace">${sym} ${fmtX(cv(grandGHS))}</td></tr></tbody></table><div class="footer">TuoBuilds Consult | Civil & Structural Engineering | ${today()} | Price DB May 2026</div></body></html>`;
  };

  const TH={fontFamily:"Courier New,monospace",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",color:GOLD_D,padding:"0 6px 8px",textAlign:"left",borderBottom:`1px solid ${BORDER}`};
  const TD={padding:"5px 6px",verticalAlign:"middle"};

  return(
    <div>
      <Sec title="BOQ Items">
        {items.length>0&&(
          <div style={{overflowX:"auto",marginBottom:10}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:620}}>
              <thead><tr>
                <th style={{...TH,width:150}}>Section</th><th style={TH}>Description</th>
                <th style={{...TH,width:56}}>Qty</th><th style={{...TH,width:72}}>Unit</th>
                <th style={{...TH,width:72}}>In</th><th style={{...TH,width:88}}>Rate</th>
                <th style={{...TH,width:105,textAlign:"right"}}>Amt ({sym})</th>
                <th style={{...TH,width:85}}>Notes</th><th style={{...TH,width:30}}/>
              </tr></thead>
              <tbody>{items.map(row=>{
                const tGHS=toGHS(sf(row.qty)*sf(row.rate),row.cur||"GHS",rates);
                return(
                  <tr key={row.id} style={{borderBottom:`1px solid rgba(201,168,76,0.07)`}}>
                    <td style={TD}><select style={{...SEL,fontSize:10}} value={row.section} onChange={e=>setItems(is=>is.map(i=>i.id===row.id?{...i,section:e.target.value}:i))}>{BOQ_SECTIONS.map(s=><option key={s}>{s}</option>)}</select></td>
                    <td style={TD}><input style={INP} value={row.description} placeholder="Description" onChange={e=>setItems(is=>is.map(i=>i.id===row.id?{...i,description:e.target.value}:i))}/></td>
                    <td style={TD}><input style={INP} type="number" value={row.qty} min={0} onChange={e=>setItems(is=>is.map(i=>i.id===row.id?{...i,qty:e.target.value}:i))}/></td>
                    <td style={TD}><select style={{...SEL,fontSize:10}} value={row.unit} onChange={e=>setItems(is=>is.map(i=>i.id===row.id?{...i,unit:e.target.value}:i))}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></td>
                    <td style={TD}><select style={{...SEL,fontSize:10}} value={row.cur||"GHS"} onChange={e=>setItems(is=>is.map(i=>i.id===row.id?{...i,cur:e.target.value}:i))}>{CURRS.map(c=><option key={c}>{c}</option>)}</select></td>
                    <td style={TD}><input style={INP} type="number" value={row.rate} min={0} onChange={e=>setItems(is=>is.map(i=>i.id===row.id?{...i,rate:e.target.value}:i))}/></td>
                    <td style={{...TD,textAlign:"right",whiteSpace:"nowrap"}}>
                      <div style={{fontFamily:"Courier New",fontSize:11,color:GOLD_L}}>{sym} {fmtX(cv(tGHS))}</div>
                      {display!=="GHS"&&<div style={{fontSize:9,color:MUTED}}>GHS {fmtN(tGHS)}</div>}
                    </td>
                    <td style={TD}><input style={{...INP,fontSize:10}} value={row.notes} placeholder="Notes" onChange={e=>setItems(is=>is.map(i=>i.id===row.id?{...i,notes:e.target.value}:i))}/></td>
                    <td style={TD}><DelBtn onClick={()=>setItems(is=>is.filter(i=>i.id!==row.id))}/></td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        )}
        <button style={BTN_A} onClick={()=>setItems(is=>[...is,{id:uid(),section:"Substructure / Foundation",description:"",qty:1,unit:"m³",rate:0,cur:"GHS",notes:""}])}>＋ Add Item</button>
      </Sec>
      {items.length>0&&(
        <Sec title={`BOQ Summary — ${sym}`}>
          {Object.entries(grouped).map(([sec,rows])=>{
            const tGHS=rows.reduce((s,r)=>s+toGHS(sf(r.qty)*sf(r.rate),r.cur||"GHS",rates),0);
            return(
              <div key={sec} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",marginBottom:4,background:NAVY,borderRadius:2,borderLeft:`2px solid ${GOLD_D}`}}>
                <span style={{fontFamily:"Courier New",fontSize:11,color:MUTED}}>{sec}</span>
                <div style={{textAlign:"right"}}>
                  <span style={{fontFamily:"Courier New",fontSize:11,color:WHITE}}>{sym} {fmtX(cv(tGHS))}</span>
                  {display!=="GHS"&&<div style={{fontSize:9,color:MUTED}}>GHS {fmtN(tGHS)}</div>}
                </div>
              </div>
            );
          })}
          <div style={{display:"flex",justifyContent:"space-between",padding:"12px 14px",marginTop:8,background:"rgba(201,168,76,0.08)",border:`1px solid ${GOLD}`,borderRadius:2}}>
            <span style={{fontFamily:"Courier New",fontSize:13,color:GOLD,fontWeight:700}}>GRAND TOTAL ({sym})</span>
            <div style={{textAlign:"right"}}>
              <span style={{fontFamily:"Courier New",fontSize:14,color:GOLD_L,fontWeight:700}}>{sym} {fmtX(cv(grandGHS))}</span>
              {display!=="GHS"&&<div style={{fontSize:10,color:MUTED}}>GHS {fmtN(grandGHS)}</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:14}}>
            <button style={BTN_P} onClick={()=>printHTML(buildHTML())}>🖨 Print / PDF BOQ</button>
            <button style={BTN_S} onClick={handleSave}>💾 Save</button>
            {saveMsg&&<span style={{fontFamily:"Courier New",fontSize:11,color:OK,alignSelf:"center"}}>{saveMsg}</span>}
            <button style={BTN_S} onClick={()=>{if(window.confirm("Clear all?"))setItems([]);}}>✕ Clear</button>
          </div>
        </Sec>
      )}
      {modal&&<MobileModal content={modal} onClose={()=>setModal(null)} title="BOQ Export"/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   INVOICE / QUOTATION
══════════════════════════════════════════════════════ */
function InvoiceGen({display,rates,projName,client,loc,ptype}){
  const [type,setType]=useState("Quotation");
  const [invNo,setInvNo]=useState(`TBC-${new Date().getFullYear()}-001`);
  const [issueDate,setIssueDate]=useState(isoDate());
  const [dueDate,setDueDate]=useState("");
  const [toName,setToName]=useState(client||"");
  const [toAddr,setToAddr]=useState(loc||"");
  const [toEmail,setToEmail]=useState("");
  const [toPhone,setToPhone]=useState("");
  const [invCurr,setInvCurr]=useState(display);
  const [lines,setLines]=useState([{id:uid(),desc:"",qty:1,unit:"lump sum",rate:0,cur:display}]);
  const [disc,setDisc]=useState("0");
  const [vatP,setVatP]=useState("0");
  const [notes,setNotes]=useState("Payment terms: 50% advance, 50% on completion.");
  useEffect(()=>{setToName(client||"");setToAddr(loc||"");},[client,loc]);

  const sym=invCurr;
  const cv=n=>fromGHS(n,invCurr,rates);
  const subGHS=lines.reduce((s,r)=>s+toGHS(sf(r.qty)*sf(r.rate),r.cur||invCurr,rates),0);
  const discAmt=subGHS*sf(disc)/100,aft=subGHS-discAmt,vatAmt=aft*sf(vatP)/100,totalGHS=aft+vatAmt;

  const buildHTML=()=>{
    const fxLine=CURRS.filter(c=>c!==invCurr).map(c=>`1 ${invCurr} = ${fmtX(crossConvert(1,invCurr,c,rates))} ${c}`).join(" &nbsp;·&nbsp; ");
    const lHTML=lines.map((r,i)=>{const tGHS=toGHS(sf(r.qty)*sf(r.rate),r.cur||invCurr,rates);return`<tr><td style="padding:9px 10px;border-bottom:1px solid #e5e7eb;font-size:13px">${i+1}</td><td style="padding:9px 10px;border-bottom:1px solid #e5e7eb;font-size:13px">${r.desc||"—"}</td><td style="padding:9px 10px;border-bottom:1px solid #e5e7eb;text-align:center;font-size:13px">${r.qty}</td><td style="padding:9px 10px;border-bottom:1px solid #e5e7eb;text-align:center;font-size:13px">${r.unit}</td><td style="padding:9px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-family:monospace;font-size:13px">${sym} ${fmtX(cv(toGHS(sf(r.rate),r.cur||invCurr,rates)))}</td><td style="padding:9px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-family:monospace;font-size:13px;font-weight:600">${sym} ${fmtX(cv(tGHS))}</td></tr>`;}).join("");
    return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${type} ${invNo}</title><style>body{font-family:Arial,sans-serif;padding:36px;color:#111;margin:0;max-width:800px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}.co-name{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#c9a84c;font-weight:700;margin-bottom:4px}.co-title{font-size:28px;font-weight:900;color:#0a1628;font-family:Georgia,serif}.inv-type{font-size:28px;font-weight:700;color:#c9a84c;text-align:right}.inv-no{font-size:13px;color:#6b7280;text-align:right;margin-top:4px}.parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;padding:16px;background:#f9fafb;border-radius:4px}.party-lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#c9a84c;font-weight:700;margin-bottom:6px}.party-name{font-size:14px;font-weight:700;color:#111;margin-bottom:3px}.party-info{font-size:12px;color:#6b7280;line-height:1.6}table{width:100%;border-collapse:collapse}th{background:#0a1628;color:#c9a84c;padding:10px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-align:left}.totals{display:flex;justify-content:flex-end;margin-top:0}.totals-box{width:320px;border:1px solid #e5e7eb;border-radius:4px;overflow:hidden}.t-row{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}.t-total{display:flex;justify-content:space-between;padding:12px 14px;background:#0a1628;font-size:15px;font-weight:700;color:#e8c97a}.notes-box{margin-top:20px;padding:14px;background:#f9fafb;border-radius:4px;font-size:12px;color:#555;line-height:1.7}.notes-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#c9a84c;font-weight:700;margin-bottom:6px}.fxbar{font-size:11px;color:#6b7280;padding:8px 0;border-top:1px solid #e5e7eb;margin-top:20px}.footer{margin-top:16px;font-size:11px;color:#9ca3af;text-align:center}@media print{body{padding:15px}}</style></head><body>
    <div class="top"><div><div class="co-name">TuoBuilds Consult</div><div class="co-title">TuoBuilds</div><div style="font-size:11px;color:#6b7280;margin-top:4px">Civil & Structural Engineering · Kumasi, Ghana</div></div><div><div class="inv-type">${type}</div><div class="inv-no">${invNo}</div><div style="font-size:12px;color:#6b7280;text-align:right;margin-top:4px">Issued: ${issueDate}${dueDate?" · Due: "+dueDate:""}</div></div></div>
    <div class="parties"><div><div class="party-lbl">From</div><div class="party-name">TuoBuilds Consult</div><div class="party-info">Kumasi, Ashanti Region, Ghana</div></div><div><div class="party-lbl">Bill To</div><div class="party-name">${toName||"Client Name"}</div><div class="party-info">${toAddr||""}${toEmail?"<br>"+toEmail:""}${toPhone?"<br>"+toPhone:""}</div></div></div>

    ${notes?`<div class="notes-box"><div class="notes-lbl">Notes & Terms</div>${notes}</div>`:""}

  };

          <Field label="Reference No."><input style={INP} value={invNo} onChange={e=>setInvNo(e.target.value)}/></Field>

          <Field label="Issue Date"><input style={INP} type="date" value={issueDate} onChange={e=>setIssueDate(e.target.value)}/></Field>

          <Field label="Address"><input style={INP} value={toAddr} onChange={e=>setToAddr(e.target.value)}/></Field>
          <Field label="Email"><input style={INP} value={toEmail} onChange={e=>setToEmail(e.target.value)}/></Field>
          <Field label="Phone"><input style={INP} value={toPhone} placeholder="+233 …" onChange={e=>setToPhone(e.target.value)}/></Field>
        </div>
      </Sec>
      <Sec title={`Line Items — ${sym}`}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:520}}>
            <thead><tr><th style={TH}>Description</th><th style={{...TH,width:60}}>Qty</th><th style={{...TH,width:85}}>Unit</th><th style={{...TH,width:72}}>In</th><th style={{...TH,width:105}}>Rate</th><th style={{...TH,width:115,textAlign:"right"}}>Amt ({sym})</th><th style={{...TH,width:30}}/></tr></thead>
            <tbody>{lines.map(row=>{const tGHS=toGHS(sf(row.qty)*sf(row.rate),row.cur||invCurr,rates);return(
              <tr key={row.id} style={{borderBottom:`1px solid rgba(201,168,76,0.07)`}}>
                <td style={TD}><input style={INP} value={row.desc} placeholder="Service / work item" onChange={e=>setLines(ls=>ls.map(l=>l.id===row.id?{...l,desc:e.target.value}:l))}/></td>
                <td style={TD}><input style={INP} type="number" value={row.qty} min={0} onChange={e=>setLines(ls=>ls.map(l=>l.id===row.id?{...l,qty:e.target.value}:l))}/></td>
                <td style={TD}><select style={{...SEL,fontSize:11}} value={row.unit} onChange={e=>setLines(ls=>ls.map(l=>l.id===row.id?{...l,unit:e.target.value}:l))}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></td>
                <td style={TD}><select style={{...SEL,fontSize:11}} value={row.cur||invCurr} onChange={e=>setLines(ls=>ls.map(l=>l.id===row.id?{...l,cur:e.target.value}:l))}>{CURRS.map(c=><option key={c}>{c}</option>)}</select></td>

                  {invCurr!=="GHS"&&<div style={{fontSize:9,color:MUTED}}>GHS {fmtN(tGHS)}</div>}

            );})}</tbody>

        </div>
        <button style={BTN_A} onClick={()=>setLines(ls=>[...ls,{id:uid(),desc:"",qty:1,unit:"lump sum",rate:0,cur:invCurr}])}>＋ Add Line</button>

          <Field label="VAT / Tax (%)"><input style={INP} type="number" value={vatP} min={0} onChange={e=>setVatP(e.target.value)}/></Field>

        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
          <SumBox label="Subtotal" val={`${sym} ${fmtX(cv(subGHS))}`} sub={invCurr!=="GHS"?`GHS ${fmtN(subGHS)}`:null}/>
          {sf(disc)>0&&<SumBox label={`Disc ${sf(disc).toFixed(1)}%`} val={`- ${sym} ${fmtX(cv(discAmt))}`} color={DANGER}/>}
          {vatAmt>0&&<SumBox label={`VAT ${sf(vatP).toFixed(1)}%`} val={`${sym} ${fmtX(cv(vatAmt))}`}/>}
          <SumBox label={`Total (${sym})`} val={`${sym} ${fmtX(cv(totalGHS))}`} sub={invCurr!=="GHS"?`GHS ${fmtN(totalGHS)}`:null} accent/>

      </Sec>
    </div>
  );
}

══════════════════════════════════════════════════════ */
function ProgressTracker({projName,onSave,savedData}){
  const [tasks,setTasks]=useState([]);
  const [saveMsg,setSaveMsg]=useState("");

  useEffect(()=>{
    if(savedData&&savedData.tasks){setTasks(savedData.tasks);return;}
    setTasks([
      {id:uid(),stage:"Site Preparation",task:"Site clearance & levelling",status:"Done",pct:100,start:"",end:"",notes:""},
      {id:uid(),stage:"Foundation",task:"Set out & excavation",status:"Done",pct:100,start:"",end:"",notes:""},
      {id:uid(),stage:"Foundation",task:"Anti-termite treatment",status:"Done",pct:100,start:"",end:"",notes:""},
      {id:uid(),stage:"Foundation",task:"Concrete footings & blinding",status:"In Progress",pct:60,start:"",end:"",notes:""},
      {id:uid(),stage:"Superstructure",task:"Block laying to DPC",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Superstructure",task:"Columns & ring beam",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Superstructure",task:"Suspended slab (if applicable)",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Roofing",task:"Roof truss installation",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Roofing",task:"Roofing sheet & gutters",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"MEP Rough-in",task:"Electrical 1st fix (conduits)",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"MEP Rough-in",task:"Plumbing 1st fix (pipes)",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Finishes",task:"Plastering & rendering",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Finishes",task:"Screeding & tiling",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Finishes",task:"Painting (interior & exterior)",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"MEP Fit-out",task:"Electrical 2nd fix",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"MEP Fit-out",task:"Plumbing 2nd fix & sanitary",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"External Works",task:"Boundary wall & gate",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"External Works",task:"Driveway & paving",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Handover",task:"Snagging & defect rectification",status:"Not Started",pct:0,start:"",end:"",notes:""},
      {id:uid(),stage:"Handover",task:"Final inspection & handover",status:"Not Started",pct:0,start:"",end:"",notes:""},
    ]);
  },[]);

  const overallPct=tasks.length?Math.round(tasks.reduce((s,t)=>s+sf(t.pct),0)/tasks.length):0;
  const stages=[...new Set(tasks.map(t=>t.stage))];
  const done=tasks.filter(t=>t.status==="Done").length;
  const handleSave=()=>{onSave({tasks});setSaveMsg("✓ Saved!");setTimeout(()=>setSaveMsg(""),2000);};

  const buildPrintHTML=()=>{
    const stHTML=stages.map((st,si)=>{
      const color=STAGE_COLORS[si%STAGE_COLORS.length];
      const stT=tasks.filter(t=>t.stage===st);
      const sPct=Math.round(stT.reduce((s,t)=>s+sf(t.pct),0)/stT.length);
      return`<div style="margin-bottom:20px"><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f3f4f6;border-left:4px solid ${color};margin-bottom:8px"><strong style="font-size:13px">${st}</strong><span style="font-size:12px;color:#555">${sPct}% complete</span></div><table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f9fafb"><th style="padding:7px 10px;font-size:11px;text-align:left;border-bottom:1px solid #e5e7eb">Task</th><th style="padding:7px 10px;font-size:11px;text-align:left;border-bottom:1px solid #e5e7eb;width:90px">Status</th><th style="padding:7px 10px;font-size:11px;text-align:center;border-bottom:1px solid #e5e7eb;width:50px">%</th><th style="padding:7px 10px;font-size:11px;text-align:left;border-bottom:1px solid #e5e7eb;width:80px">Start</th><th style="padding:7px 10px;font-size:11px;text-align:left;border-bottom:1px solid #e5e7eb;width:80px">End</th><th style="padding:7px 10px;font-size:11px;text-align:left;border-bottom:1px solid #e5e7eb">Notes</th></tr></thead><tbody>${stT.map(t=>`<tr><td style="padding:8px 10px;font-size:12px;border-bottom:1px solid #f0f0f0">${t.task||"—"}</td><td style="padding:8px 10px;font-size:12px;border-bottom:1px solid #f0f0f0"><span style="background:${STATUS_COLORS[t.status]||MUTED};color:#fff;padding:2px 8px;border-radius:10px;font-size:10px">${t.status}</span></td><td style="padding:8px 10px;text-align:center;font-size:12px;border-bottom:1px solid #f0f0f0">${t.pct}%</td><td style="padding:8px 10px;font-size:12px;border-bottom:1px solid #f0f0f0">${t.start||"—"}</td><td style="padding:8px 10px;font-size:12px;border-bottom:1px solid #f0f0f0">${t.end||"—"}</td><td style="padding:8px 10px;font-size:11px;color:#6b7280;border-bottom:1px solid #f0f0f0">${t.notes||""}</td></tr>`).join("")}</tbody></table></div>`;
    }).join("");
    return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Progress Report</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#111;margin:0}.hdr{border-bottom:3px solid #c9a84c;padding-bottom:16px;margin-bottom:24px}.co{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#c9a84c;font-weight:700}h1{font-size:22px;color:#0a1628;margin:6px 0}.meta{font-size:12px;color:#6b7280;margin-top:6px}.pb{height:16px;background:#e5e7eb;border-radius:8px;overflow:hidden;margin:12px 0}.pf{height:100%;background:linear-gradient(90deg,#4c7fc9,#4caf82);border-radius:8px}.footer{margin-top:30px;font-size:11px;color:#9ca3af;text-align:center;border-top:1px solid #e5e7eb;padding-top:14px}@media print{body{padding:15px}}</style></head><body><div class="hdr"><div class="co">TuoBuilds Consult</div><h1>Project Progress Report</h1><div class="meta"><strong>${projName||"Unnamed Project"}</strong> · ${today()}</div></div><div style="margin-bottom:24px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><strong>Overall Completion</strong><strong>${overallPct}% (${done}/${tasks.length} tasks done)</strong></div><div class="pb"><div class="pf" style="width:${overallPct}%"></div></div></div>${stHTML}<div class="footer">TuoBuilds Consult | Civil & Structural Engineering | ${today()}</div></body></html>`;
  };

  const TH={fontFamily:"Courier New,monospace",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",color:GOLD_D,padding:"0 6px 8px",textAlign:"left",borderBottom:`1px solid ${BORDER}`};
  const TD={padding:"5px 6px",verticalAlign:"middle"};

  return(
    <div>
      <Sec title="Overall Progress">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontFamily:"Courier New",fontSize:12,color:MUTED}}>Project Completion</span>
          <span style={{fontFamily:"Courier New",fontSize:14,color:GOLD_L,fontWeight:700}}>{overallPct}% &nbsp;·&nbsp; {done}/{tasks.length} tasks</span>
        </div>
        <div style={{height:18,background:NAVY,borderRadius:9,overflow:"hidden",marginBottom:14}}>
          <div style={{height:"100%",width:`${overallPct}%`,background:`linear-gradient(90deg,${BLUE},${OK})`,borderRadius:9,transition:"width 0.5s ease"}}/>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {STATUS_OPTS.map(s=>{const cnt=tasks.filter(t=>t.status===s).length;if(!cnt)return null;return(<div key={s} style={{display:"flex",alignItems:"center",gap:6,fontFamily:"Courier New",fontSize:11,color:MUTED}}><div style={{width:10,height:10,background:STATUS_COLORS[s],borderRadius:2}}/>{s} ({cnt})</div>);})}
        </div>
      </Sec>

      {stages.map((stage,si)=>{
        const color=STAGE_COLORS[si%STAGE_COLORS.length];
        const stT=tasks.filter(t=>t.stage===stage);
        const sPct=Math.round(stT.reduce((s,t)=>s+sf(t.pct),0)/stT.length);
        return(
          <Sec key={stage} title={`${stage} — ${sPct}%`}>
            <div style={{height:6,background:NAVY,borderRadius:3,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${sPct}%`,background:color,borderRadius:3,transition:"width 0.4s"}}/></div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:520}}>
                <thead><tr><th style={TH}>Task</th><th style={{...TH,width:110}}>Status</th><th style={{...TH,width:65}}>%</th><th style={{...TH,width:95}}>Start</th><th style={{...TH,width:95}}>End</th><th style={TH}>Notes</th><th style={{...TH,width:30}}/></tr></thead>
                <tbody>{stT.map(row=>(
                  <tr key={row.id} style={{borderBottom:`1px solid rgba(201,168,76,0.07)`}}>
                    <td style={TD}><input style={INP} value={row.task} placeholder="Task description" onChange={e=>setTasks(ts=>ts.map(t=>t.id===row.id?{...t,task:e.target.value}:t))}/></td>
                    <td style={TD}><select style={{...SEL,fontSize:11,borderColor:STATUS_COLORS[row.status]||BORDER,color:STATUS_COLORS[row.status]||WHITE}} value={row.status} onChange={e=>setTasks(ts=>ts.map(t=>t.id===row.id?{...t,status:e.target.value,pct:e.target.value==="Done"?100:t.pct}:t))}>{STATUS_OPTS.map(s=><option key={s}>{s}</option>)}</select></td>
                    <td style={TD}><input style={INP} type="number" value={row.pct} min={0} max={100} onChange={e=>setTasks(ts=>ts.map(t=>t.id===row.id?{...t,pct:Math.min(100,sf(e.target.value))}:t))}/></td>
                    <td style={TD}><input style={{...INP,fontSize:11}} type="date" value={row.start} onChange={e=>setTasks(ts=>ts.map(t=>t.id===row.id?{...t,start:e.target.value}:t))}/></td>
                    <td style={TD}><input style={{...INP,fontSize:11}} type="date" value={row.end} onChange={e=>setTasks(ts=>ts.map(t=>t.id===row.id?{...t,end:e.target.value}:t))}/></td>
                    <td style={TD}><input style={{...INP,fontSize:11}} value={row.notes} placeholder="Notes" onChange={e=>setTasks(ts=>ts.map(t=>t.id===row.id?{...t,notes:e.target.value}:t))}/></td>
                    <td style={TD}><DelBtn onClick={()=>setTasks(ts=>ts.filter(t=>t.id!==row.id))}/></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </Sec>
        );
      })}

      <Sec title="Add Tasks">
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["Site Preparation","Foundation","Superstructure","Roofing","MEP Rough-in","Finishes","MEP Fit-out","External Works","Landscaping","Handover"].map(stage=>(
            <button key={stage} style={{...BTN_A,marginTop:0}} onClick={()=>setTasks(ts=>[...ts,{id:uid(),stage,task:"",status:"Not Started",pct:0,start:"",end:"",notes:""}])}>＋ {stage}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:14}}>
          <button style={BTN_P} onClick={()=>printHTML(buildPrintHTML())}>🖨 Print Progress Report</button>
          <button style={BTN_S} onClick={handleSave}>💾 Save</button>
          {saveMsg&&<span style={{fontFamily:"Courier New",fontSize:11,color:OK,alignSelf:"center"}}>{saveMsg}</span>}
        </div>
      </Sec>
    </div>
  );
}

const TABS=["Cost Estimator","BOQ Generator","Invoice/Quotation","Progress Tracker"];
const STORAGE_KEY="tuobuilds_v4";

function App(){
  const [tab,setTab]=useState(0);
  const [projName,setProjName]=useState("");
  const [client,setClient]=useState("");
  const [loc,setLoc]=useState("Kumasi, Ashanti");
  const [ptype,setPtype]=useState("Residential");
  const [display,setDisplay]=useState("GHS");
  const [rates,setRates]=useState(FALLBACK_RATES);
  const [rateStatus,setRateStatus]=useState("Fallback rates — May 2026 Stanbic mid");
  const [savedData,setSavedData]=useState({est:{},boq:{},tracker:{}});

  const fetchRates=useCallback(async()=>{
    setRateStatus("⟳ Fetching live rates…");
    try{
      const r=await fetch("https://api.frankfurter.app/latest?base=GHS&symbols=USD,GBP,EUR");
      if(!r.ok)throw new Error();
      const j=await r.json();
      if(j&&j.rates){setRates({GHS:1,...j.rates});setRateStatus(`✓ Live · ${new Date().toLocaleTimeString()}`);return;}
    }catch(e){}
    try{
      const r2=await fetch("https://open.er-api.com/v6/latest/GHS");
      const j2=await r2.json();
      if(j2&&j2.rates){setRates({GHS:1,USD:j2.rates.USD,GBP:j2.rates.GBP,EUR:j2.rates.EUR});setRateStatus(`✓ Live (alt) · ${new Date().toLocaleTimeString()}`);return;}
    }catch(e){}
    setRateStatus("⚠ Offline — using May 2026 fallback");
  },[]);

  useEffect(()=>{
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      if(raw){const d=JSON.parse(raw);if(d.meta){setProjName(d.meta.projName||"");setClient(d.meta.client||"");setLoc(d.meta.loc||"Kumasi, Ashanti");setPtype(d.meta.ptype||"Residential");setDisplay(d.meta.display||"GHS");}setSavedData({est:d.est||{},boq:d.boq||{},tracker:d.tracker||{}});}
    }catch(e){}
    fetchRates();
  },[]);

  const saveSection=(key,data)=>{
    try{const prev=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");localStorage.setItem(STORAGE_KEY,JSON.stringify({...prev,meta:{projName,client,loc,ptype,display},[key]:data}));setSavedData(s=>({...s,[key]:data}));}catch(e){}
  };

  return(
    <div style={{background:NAVY,minHeight:"100vh",color:WHITE,fontFamily:"sans-serif"}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,backgroundImage:`linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px)`,backgroundSize:"48px 48px"}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:980,margin:"0 auto",padding:"36px 18px 80px"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:28,animation:"fadeUp 0.5s ease both"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:12,marginBottom:10}}>
            <div style={{width:32,height:32,border:`2px solid ${GOLD}`,transform:"rotate(45deg)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:12,height:12,background:GOLD}}/></div>
            <span style={{fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:GOLD}}>TuoBuilds Consult</span>
          </div>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:"clamp(1.6rem,4vw,2.6rem)",fontWeight:900,color:WHITE,margin:"0 0 8px"}}>Project <span style={{color:GOLD}}>Tools</span> <span style={{fontSize:"0.55em",fontFamily:"Courier New",color:MUTED,letterSpacing:"0.1em"}}>v4</span></h1>
          <p style={{fontFamily:"Courier New,monospace",fontSize:10,letterSpacing:"0.22em",textTransform:"uppercase",color:MUTED,marginTop:4}}>
            {GH_PRICES.length} Materials · {LABOUR_TEMPLATES.length} Labour Trades · Live FX · BOQ · Invoice · Progress
          </p>
          <div style={{width:50,height:2,background:`linear-gradient(90deg,${GOLD},transparent)`,margin:"10px auto 0"}}/>
        </div>

        {/* Project Details */}
        <Sec title="Project Details">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1/-1"}}><Field label="Project Name"><input style={INP} value={projName} placeholder="e.g. 3-Bedroom Residential — Kumasi" onChange={e=>setProjName(e.target.value)}/></Field></div>
            <Field label="Client / Owner"><input style={INP} value={client} placeholder="Client / Ref" onChange={e=>setClient(e.target.value)}/></Field>
            <Field label="Site Location"><input style={INP} value={loc} placeholder="e.g. Adum, Kumasi" onChange={e=>setLoc(e.target.value)}/></Field>
            <Field label="Project Type"><select style={SEL} value={ptype} onChange={e=>setPtype(e.target.value)}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></Field>
            <Field label="Display Currency">
              <select style={{...SEL,borderColor:GOLD,color:GOLD}} value={display} onChange={e=>setDisplay(e.target.value)}>
                {CURRS.map(c=><option key={c} value={c}>{CURR_FLAGS[c]} {c}</option>)}
              </select>
            </Field>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:12,flexWrap:"wrap"}}>
            <div style={{fontFamily:"Courier New",fontSize:10,color:MUTED}}>💾 Data auto-saves per section via localStorage</div>
            <button onClick={()=>{if(window.confirm("Clear ALL saved data?"))try{localStorage.removeItem(STORAGE_KEY);setSavedData({est:{},boq:{},tracker:{}});}catch(e){}}} style={{...BTN_S,padding:"7px 14px",fontSize:10,marginLeft:"auto"}}>✕ Clear All Saved</button>
          </div>
        </Sec>

        {/* Currency Panel */}
        <CurrencyPanel display={display} setDisplay={setDisplay} rates={rates} setRates={setRates} rateStatus={rateStatus} refreshRates={fetchRates}/>

        {/* Price DB Note */}
        <div style={{fontFamily:"Courier New",fontSize:10,color:MUTED,textAlign:"center",marginBottom:12,letterSpacing:"0.1em"}}>
          📊 Material prices sourced: BusyList · NewsGhana Nov 2025 · Troysteel 2025 · Added Supplies 2026 · GSS Prime Building Cost Index Jan 2026 (PBCI 132.4, inflation 3.9%) · Kumasi open market May 2026
        </div>

        {/* Tabs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:2,marginBottom:16,background:NAVY_M,borderRadius:4,padding:4,border:`1px solid ${BORDER}`}}>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setTab(i)} style={{padding:"10px 6px",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"Courier New,monospace",fontSize:"clamp(9px,1.5vw,11px)",letterSpacing:"0.1em",textTransform:"uppercase",transition:"all 0.2s",background:tab===i?NAVY_L:"none",color:tab===i?GOLD:MUTED,fontWeight:tab===i?700:"normal"}}>{t}</button>
          ))}
        </div>

        {tab===0&&<CostEstimator display={display} rates={rates} projName={projName} client={client} loc={loc} ptype={ptype} onSave={d=>saveSection("est",d)} savedData={savedData.est}/>}
        {tab===1&&<BOQGenerator  display={display} rates={rates} projName={projName} client={client} loc={loc} ptype={ptype} onSave={d=>saveSection("boq",d)} savedData={savedData.boq}/>}
        {tab===2&&<InvoiceGen    display={display} rates={rates} projName={projName} client={client} loc={loc} ptype={ptype}/>}
        {tab===3&&<ProgressTracker projName={projName} onSave={d=>saveSection("tracker",d)} savedData={savedData.tracker}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
